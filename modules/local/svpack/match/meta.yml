name: "svpack_match"
description: Match structural variants between two VCF callsets
keywords:
  - structural variants
  - sv
  - vcf
  - match
  - variant calling
  - comparison
tools:
  - svpack:
      description: Tools for filtering, comparing, and annotating structural variant (SV) calls in VCF format
      homepage: https://github.com/PacificBiosciences/svpack
      documentation: https://github.com/PacificBiosciences/svpack
      tool_dev_url: https://github.com/PacificBiosciences/svpack
      licence: ["BSD-3-Clause-Clear"]

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - vcf_a:
        type: file
        description: First input VCF or VCF.GZ file containing structural variants (query)
        pattern: "*.{vcf,vcf.gz}"
  - - meta2:
        type: map
        description: |
          Groovy Map containing sample information for second VCF
          e.g. [ id:'control', single_end:false ]
    - vcf_b:
        type: file
        description: Second input VCF or VCF.GZ file containing structural variants (reference for matching)
        pattern: "*.{vcf,vcf.gz}"

output:
  vcf:
    - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - "*.matched.vcf":
        type: file
        description: VCF file with matched variants in gzip format
        pattern: "*.matched.vcf"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"

authors:
  - "@haidyi"
maintainers:
  - "@haidyi"

name: "svpack_tagzygosity"
description: Tag variants with sample zygosity information (heterozygous and homozygous alternate genotypes)
keywords:
  - structural variants
  - sv
  - vcf
  - zygosity
  - genotype
  - heterozygous
  - homozygous
  - variant calling
tools:
  - svpack:
      description: Tools for filtering, comparing, and annotating structural variant (SV) calls in VCF format
      homepage: https://github.com/PacificBiosciences/svpack
      documentation: https://github.com/PacificBiosciences/svpack
      tool_dev_url: https://github.com/PacificBiosciences/svpack
      licence: ["BSD-3-Clause-Clear"]

input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - vcf:
        type: file
        description: Input VCF or VCF.GZ file containing structural variants with genotype information
        pattern: "*.{vcf,vcf.gz}"

output:
  meta:
    - meta:
        type: map
        description: |
          Groovy Map containing sample information
          e.g. [ id:'test', single_end:false ]
    - "*.tagged.vcf":
        type: file
        description: VCF file with hetalt and homalt INFO tags added in gzip format
        pattern: "*.tagged.vcf"
  versions:
    - "versions.yml":
        type: file
        description: File containing software versions
        pattern: "versions.yml"

authors:
  - "@haidyi"
maintainers:
  - "@haidyi"
